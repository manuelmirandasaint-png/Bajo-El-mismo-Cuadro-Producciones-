<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEMC PROD | Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #FF9100;
            --glass: rgba(25, 25, 25, 0.75);
            --sidebar-bg: rgba(35, 35, 35, 0.4);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: #000;
            background-image: radial-gradient(circle at 50% -20%, #222, #000);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- HEADER PRINCIPAL (BARRA SUPERIOR) --- */
        .top-nav {
            height: 70px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 40px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .brand-logo {
            height: 50px; /* Logo más grande */
            margin-right: 40px;
        }

        .top-menu a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            margin-right: 25px;
            opacity: 0.7;
            transition: 0.3s;
        }
        .top-menu a:hover { opacity: 1; color: var(--orange); }

        /* --- CONTENEDOR TIPO FINDER (ERM) --- */
        .finder-container {
            display: flex;
            max-width: 1400px;
            margin: 40px auto;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            min-height: 70vh;
        }

        /* SIDEBAR IZQUIERDA */
        .sidebar {
            width: 240px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 20px 0;
        }

        .sidebar-label {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--orange);
            padding: 10px 25px;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .sidebar-item {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            color: rgba(255,255,255,0.7);
        }
        .sidebar-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .sidebar-item.active { background: rgba(255,145,0,0.15); color: var(--orange); font-weight: 600; }

        /* ÁREA DE CONTENIDO (GALERÍA) */
        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .folder-card {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }
        .folder-card:hover { border-color: var(--orange); transform: translateY(-3px); }

        .thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 6px;
            margin-bottom: 15px;
            background-size: cover;
            background-position: center;
        }

        /* --- DOCK CON TOOLTIPS --- */
        .dock {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 18px;
            display: flex;
            gap: 12px;
            border: 1px solid var(--border);
        }

        .dock-icon {
            width: 45px; height: 45px;
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .dock-icon:hover { transform: scale(1.2) translateY(-10px); background: var(--orange); }

        /* Tooltip */
        .dock-icon::after {
            content: attr(data-title);
            position: absolute;
            top: -45px;
            background: rgba(0,0,0,0.8);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s;
        }
        .dock-icon:hover::after { opacity: 1; top: -55px; }

        /* --- CLIENTES --- */
        .clients {
            padding: 60px 20px;
            text-align: center;
        }
        .client-grid {
            display: flex;
            justify-content: center;
            gap: 50px;
            flex-wrap: wrap;
            margin-top: 30px;
            opacity: 0.5;
            filter: grayscale(1);
        }
        .client-grid img { height: 30px; }

        /* --- ADAPTACIÓN MÓVIL --- */
        @media (max-width: 768px) {
            .finder-container { flex-direction: column; margin: 20px; }
            .sidebar { width: 100%; display: flex; overflow-x: auto; padding: 10px; }
            .sidebar-label { display: none; }
            .sidebar-item { padding: 8px 15px; white-space: nowrap; }
            .top-nav { padding: 0 20px; }
            .top-menu { display: none; }
            .dock { width: 90%; justify-content: space-around; }
        }
    </style>
</head>
<body>

    <header class="top-nav">
        <img src="bajo-el-mismo-cuadro-logo---copia.jpg" alt="BEMC Logo" class="brand-logo">
        <nav class="top-menu">
            <a href="#">PRODUCCIONES</a>
            <a href="#">MARKETING</a>
            <a href="#">SISTEMA</a>
        </nav>
    </header>

    <div class="finder-container">
        <aside class="sidebar">
            <p class="sidebar-label">FAVORITOS</p>
            <div class="sidebar-item active">🎥 Vídeos Recientes</div>
            <div class="sidebar-item">🧊 Proyectos CGI</div>
            <div class="sidebar-item">📷 Fotografía</div>
            
            <p class="sidebar-label" style="margin-top:20px">MARKETING</p>
            <div class="sidebar-item">📊 Analíticas</div>
            <div class="sidebar-item">🤝 Clientes</div>
        </aside>

        <main class="content-area">
            <h2 style="margin-bottom:30px; font-weight:400; font-size: 1.5rem;">Explorador de Proyectos</h2>
            <div class="grid-view">
                
                <div class="folder-card">
                    <div class="thumb" style="background-image: url('https://images.unsplash.com/photo-1492691523567-61123617b365?q=80&w=400')"></div>
                    <h4 style="color:var(--orange)">Showreel_2026.mp4</h4>
                    <p style="font-size:0.8rem; opacity:0.6; margin-top:5px">VFX & Edición Final</p>
                </div>

                <div class="folder-card">
                    <div class="thumb" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=400')"></div>
                    <h4 style="color:var(--orange)">Render_3D_Sim.obj</h4>
                    <p style="font-size:0.8rem; opacity:0.6; margin-top:5px">Blender Procedural</p>
                </div>

            </div>
        </main>
    </div>

    <section class="clients">
        <p style="font-size: 0.7rem; letter-spacing: 2px; opacity: 0.5;">PARTNERS ESTRATÉGICOS</p>
        <div class="client-grid">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b1/Sony_logo.svg">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/20/Adidas_Logo.svg">
        </div>
    </section>

    <div class="dock">
        <div class="dock-icon" data-title="Video">🎬</div>
        <div class="dock-icon" data-title="CGI & 3D">🧊</div>
        <div class="dock-icon" data-title="Fotografía">📷</div>
        <div class="dock-icon" data-title="Marketing">📈</div>
        <div class="dock-icon" data-title="Contacto">✉️</div>
    </div>

</body>
</html>
